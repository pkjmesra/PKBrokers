# ============================================================================
    # NEW STEP: Validate PKL freshness, trigger retry if stale
    # ============================================================================
    - name: Validate PKL data freshness
      id: freshness_check
      if: inputs.period == 'day'
      run: |
        cd pkbrokers/kite/examples/
        
        # Get target date
        TARGET_INFO=$(python3 -c "
        from PKDevTools.classes import Archiver
        cache_exists, cache_file_name = Archiver.afterMarketStockDataExists()
        if cache_file_name:
            print(f'{cache_file_name}')
        else:
            print('stock_data_$(date +%d%m%Y).pkl')
        ")
        if [[ $TARGET_INFO =~ stock_data_([0-9]{8})\.pkl ]]; then
            TARGET_DATE="${BASH_REMATCH[1]}"
        else
            TARGET_DATE=$(date +%d%m%Y)
        fi
        
        PKL_PATH="results/Data/stock_data_${TARGET_DATE}.pkl"
        if [ ! -f "$PKL_PATH" ]; then
            echo "No PKL file found, skipping freshness check."
            exit 0
        fi
        
        # ✅ Export the variable so Python can see it
        export PKL_PATH
        export RETRY_COUNT=${{ inputs.retry_count || 0 }}
        
        # Check freshness using Python
        python3 << 'EOF'
        import pickle
        import pandas as pd
        from datetime import datetime, timedelta
        import pytz
        import sys
        import os
        
        PKL_PATH = os.environ['PKL_PATH']
        RETRY_COUNT = int(os.environ.get('RETRY_COUNT', 0))
        
        # Load PKL
        with open(PKL_PATH, 'rb') as f:
            data = pickle.load(f)
        
        # Find a sample stock (RELIANCE, TCS, etc.)
        sample_symbols = ['RELIANCE', 'TCS', 'INFY', 'HDFCBANK', 'ICICIBANK']
        sample_df = None
        for sym in sample_symbols:
            if sym in data:
                sample_df = data[sym]
                break
        if sample_df is None:
            # Take any symbol
            sample_df = next(iter(data.values()))
        
        # Get latest timestamp (index)
        latest_idx = sample_df.index.max()
        # Convert to IST if not already
        ist = pytz.timezone('Asia/Kolkata')
        if latest_idx.tz is None:
            latest_idx = latest_idx.tz_localize('UTC').tz_convert(ist)
        else:
            latest_idx = latest_idx.tz_convert(ist)
        
        # Get current IST time
        now_ist = datetime.now(ist)
        
        # Determine allowed staleness
        # After market close (15:30), we allow data up to 15:29 of the last trading day
        # Otherwise, require within 2 minutes of now
        market_close = now_ist.replace(hour=15, minute=30, second=0, microsecond=0)
        if now_ist >= market_close:
            # After market: data should be from today's close (15:29:59 or earlier)
            # Allow if latest_idx date is today and time <= 15:30:00
            if latest_idx.date() == now_ist.date() and latest_idx.time() <= market_close.time():
                max_lag_minutes = 5  # Allow small lag after close
            else:
                # Data is from a previous day -> stale
                max_lag_minutes = 1
        else:
            # During market hours: require data within 5 minutes of current time
            max_lag_minutes = 5
        
        # Calculate difference
        diff = now_ist - latest_idx
        if diff.total_seconds() > max_lag_minutes * 60 and not str(latest_idx).endswith("00:00:00+05:30"):
            print(f"STALE: latest data timestamp {latest_idx} is {diff.total_seconds()/60:.1f} minutes old (limit {max_lag_minutes} min).")
            sys.exit(1)   # Signal stale
        else:
            print(f"FRESH: latest data timestamp {latest_idx} is {diff.total_seconds()/60:.1f} minutes old.")
            sys.exit(0)
        EOF
        
        # Capture exit code
        if [ $? -ne 0 ]; then
            echo "Data is stale. Will trigger retry."
            echo "is_stale=true" >> $GITHUB_OUTPUT
        else
            echo "is_stale=false" >> $GITHUB_OUTPUT
        fi

    - name: Clean stale data and trigger retry
      if: steps.freshness_check.outputs.is_stale == 'true' && env.RETRY_COUNT < 3
      env:
        CI_PAT: ${{ secrets.CI_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RETRY_COUNT: ${{ inputs.retry_count || 0 }}
      run: |
        echo "⚠️ Data stale (attempt $((RETRY_COUNT+1))/3). Cleaning and retriggering..."
        
        cd pkbrokers/kite/examples/
        
        # Get target date again
        TARGET_INFO=$(python3 -c "
        from PKDevTools.classes import Archiver
        cache_exists, cache_file_name = Archiver.afterMarketStockDataExists()
        if cache_file_name:
            print(f'{cache_file_name}')
        else:
            print('stock_data_$(date +%d%m%Y).pkl')
        ")
        if [[ $TARGET_INFO =~ stock_data_([0-9]{8})\.pkl ]]; then
            TARGET_DATE="${BASH_REMATCH[1]}"
        else
            TARGET_DATE=$(date +%d%m%Y)
        fi
        
        # Delete local PKL and DB
        rm -f results/Data/stock_data_${TARGET_DATE}.pkl
        rm -f results/Data/daily_candles.pkl
        rm -f results/Data/instrument_history.db
        echo "Removed local stale files."
        
        # Remove remote DB zip from actions-data-download branch
        git clone --single-branch --branch actions-data-download https://x-access-token:$CI_PAT@github.com/pkjmesra/PKScreener.git pkscreener-data
        cd pkscreener-data
        DATED_ZIP="instrument_history_day_${TARGET_DATE}.db.zip"
        if [ -f "actions-data-download/$DATED_ZIP" ]; then
            git rm "actions-data-download/$DATED_ZIP"
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git commit -m "Remove stale DB zip for $TARGET_DATE [skip ci]"
            git push
            echo "Removed remote stale DB zip."
        fi
        cd ../..
        
        # Trigger a new run with incremented retry count
        NEW_RETRY=$((RETRY_COUNT+1))
        echo "Triggering new workflow run (retry $NEW_RETRY)..."
        
        curl -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/w1-workflow-history-data-child.yml/dispatches" \
          -d '{
            "ref":"main",
            "inputs":{
              "period":"${{ inputs.period }}",
              "logLevel":"${{ inputs.logLevel || 20 }}",
              "kiteToken":"${{ inputs.kiteToken || secrets.KTOKEN }}",
              "pastoffset":"${{ inputs.pastoffset || 251 }}",
              "retry_count":"'"$NEW_RETRY"'"
            }
          }'
        
        echo "Retry triggered. Exiting this run."
        exit 0

    - name: Notify stale data failure (max retries)
      if: steps.freshness_check.outputs.is_stale == 'true' && env.RETRY_COUNT >= 3
      run: |
        echo "❌ Data remains stale after 3 retries. Sending Telegram notification and aborting commit."
        cd pkbrokers/kite/examples/
        python3 -c "
        import os
        from PKDevTools.classes.Telegram import send_message
        send_message('⚠️ *DATA STALE ALERT* ⚠️\n\nHistorical data for period ${{ inputs.period }} remains stale after 3 retries.\nPlease investigate the data pipeline.\nTime: $(date)')
        "
        # Exit without committing
        exit 1

    - name: Commit updated pkl file to PKScreener actions-data-download with size validation
      if: steps.freshness_check.outputs.is_stale != 'true'
      env:
        CI_PAT: ${{ secrets.CI_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Store the original working directory
        ORIGINAL_DIR=$(pwd)
        echo "Original directory: $ORIGINAL_DIR"
        
        # Get cache file name from Archiver to determine the correct date
        cd pkbrokers/kite/examples/
        
        CACHE_INFO=$(python3 -c "
        from PKDevTools.classes import Archiver
        cache_exists, cache_file_name = Archiver.afterMarketStockDataExists()
        if cache_file_name:
            print(f'{cache_file_name}')
        else:
            print('stock_data_$(date +%d%m%Y).pkl')
        ")
        
        # Extract date from cache file name (stock_data_DDMMYYYY.pkl)
        if [[ $CACHE_INFO =~ stock_data_([0-9]{8})\.pkl ]]; then
            TARGET_DATE="${BASH_REMATCH[1]}"
        else
            TARGET_DATE=$(date +%d%m%Y)
        fi
        
        echo "Using target date from cache: $TARGET_DATE"
        
        # Store the absolute path to results/Data
        RESULTS_DATA_DIR="$(pwd)/results/Data"
        echo "Results data directory: $RESULTS_DATA_DIR"
        
        # Go back to original directory
        cd "$ORIGINAL_DIR"
        
        # Check if pkscreener-data directory exists, if not clone it
        if [ ! -d "pkscreener-data" ]; then
            echo "pkscreener-data directory not found. Cloning PKScreener actions-data-download branch..."
            git clone --single-branch --branch actions-data-download https://x-access-token:$CI_PAT@github.com/pkjmesra/PKScreener.git pkscreener-data
        else
            echo "pkscreener-data directory exists."
        fi
        
        # Now cd into pkscreener-data
        cd pkscreener-data
        
        PERIOD="${{ inputs.period }}"
        
        echo "Period: $PERIOD"
        echo "Target date: $TARGET_DATE"
        
        # Define size thresholds
        DAILY_MIN_SIZE=25000000  # 25 MB minimum for daily
        INTRADAY_MIN_SIZE=100000  # 100KB minimum for intraday
        
        # Determine pkl filename based on period and size thresholds
        case "$PERIOD" in
            "day")
                TARGET_FILE="stock_data_${TARGET_DATE}.pkl"
                GENERIC_FILE="daily_candles.pkl"
                MIN_SIZE=$DAILY_MIN_SIZE
                ;;
            "minute")
                TARGET_FILE="intraday_stock_data_${TARGET_DATE}.pkl"
                GENERIC_FILE="intraday_1m_candles.pkl"
                MIN_SIZE=$INTRADAY_MIN_SIZE
                ;;
            "5minute")
                TARGET_FILE="intraday_stock_data_${TARGET_DATE}_5min.pkl"
                GENERIC_FILE="intraday_5m_candles.pkl"
                MIN_SIZE=$INTRADAY_MIN_SIZE
                ;;
            "10minute")
                TARGET_FILE="intraday_stock_data_${TARGET_DATE}_10min.pkl"
                GENERIC_FILE="intraday_10m_candles.pkl"
                MIN_SIZE=$INTRADAY_MIN_SIZE
                ;;
            "30minute")
                TARGET_FILE="intraday_stock_data_${TARGET_DATE}_30min.pkl"
                GENERIC_FILE="intraday_30m_candles.pkl"
                MIN_SIZE=$INTRADAY_MIN_SIZE
                ;;
            "60minute")
                TARGET_FILE="intraday_stock_data_${TARGET_DATE}_60min.pkl"
                GENERIC_FILE="intraday_60m_candles.pkl"
                MIN_SIZE=$INTRADAY_MIN_SIZE
                ;;
            *)
                echo "Unknown period: $PERIOD, skipping pkl commit"
                exit 0
                ;;
        esac
        
        echo "Target file: $TARGET_FILE"
        echo "Generic file: $GENERIC_FILE"
        echo "Minimum size required: $MIN_SIZE bytes ($(($MIN_SIZE/1024/1024)) MB)"
        
        # List available files using absolute path
        echo "Files in $RESULTS_DATA_DIR:"
        ls -la "$RESULTS_DATA_DIR" 2>/dev/null || echo "Directory not found"
        
        FILES_COPIED=0
        COMMIT_NEEDED=false
        
        # Function to validate and copy pkl file
        validate_and_copy() {
            local src_file=$1
            local dst_name=$2
            
            if [ -f "$src_file" ]; then
                local file_size=$(stat -c%s "$src_file" 2>/dev/null || stat -f%z "$src_file")
                if [ "$file_size" -gt "$MIN_SIZE" ]; then
                    echo "✅ Found valid $PERIOD pkl: $src_file ($(($file_size/1024/1024)) MB)"
                    cp "$src_file" "actions-data-download/$dst_name"
                    FILES_COPIED=$((FILES_COPIED + 1))
                    COMMIT_NEEDED=true
                    return 0
                else
                    echo "⚠️ File too small (needs >$(($MIN_SIZE/1024/1024)) MB): $src_file ($(($file_size/1024/1024)) MB)"
                    return 1
                fi
            fi
            return 1
        }
        
        if [ "$PERIOD" = "day" ]; then
            # For day period, look for both daily and intraday pkl files
            # First, try to find daily pkl
            DAILY_FOUND=false
            
            for PKL_FILE in "$RESULTS_DATA_DIR"/stock_data_*.pkl "$RESULTS_DATA_DIR"/daily_candles.pkl; do
                if validate_and_copy "$PKL_FILE" "$TARGET_FILE"; then
                    validate_and_copy "$PKL_FILE" "$GENERIC_FILE"
                    DAILY_FOUND=true
                    break
                fi
            done
            
            if [ "$DAILY_FOUND" = false ]; then
                echo "⚠️ No valid daily pkl file found meeting size requirement"
            fi
            
            # Also try to commit intraday from local files for day period
            INTRADAY_MIN_SIZE=$INTRADAY_MIN_SIZE  # Use intraday size for intraday files
            
            for PKL_FILE in "$RESULTS_DATA_DIR"/intraday_stock_data_*.pkl "$RESULTS_DATA_DIR"/intraday_1m_candles.pkl; do
                if [ -f "$PKL_FILE" ]; then
                    file_size=$(stat -c%s "$PKL_FILE" 2>/dev/null || stat -f%z "$PKL_FILE")
                    if [ "$file_size" -gt "$INTRADAY_MIN_SIZE" ]; then
                        echo "✅ Found valid intraday pkl: $PKL_FILE ($(($file_size/1024/1024)) MB)"
                        cp "$PKL_FILE" "actions-data-download/intraday_stock_data_${TARGET_DATE}.pkl"
                        cp "$PKL_FILE" "actions-data-download/intraday_1m_candles.pkl"
                        FILES_COPIED=$((FILES_COPIED + 1))
                        COMMIT_NEEDED=true
                        break
                    fi
                fi
            done
            
            # If no intraday pkl, try to generate from local ticks.json as fallback
            if [ "$FILES_COPIED" -lt 2 ]; then
                echo "No valid intraday pkl found, trying to generate from local ticks.json..."
                python3 ../../../pkbrokers/scripts/generate_pkl_from_ticks.py --data-dir "$RESULTS_DATA_DIR" --verbose --interval 'minute' 2>/dev/null || true
                
                for PKL_FILE in "$RESULTS_DATA_DIR"/intraday_stock_data_*.pkl; do
                    if [ -f "$PKL_FILE" ]; then
                        file_size=$(stat -c%s "$PKL_FILE" 2>/dev/null || stat -f%z "$PKL_FILE")
                        if [ "$file_size" -gt "$INTRADAY_MIN_SIZE" ]; then
                            echo "✅ Generated valid intraday from local ticks: $PKL_FILE ($(($file_size/1024/1024)) MB)"
                            cp "$PKL_FILE" "actions-data-download/intraday_stock_data_${TARGET_DATE}.pkl"
                            cp "$PKL_FILE" "actions-data-download/intraday_1m_candles.pkl"
                            FILES_COPIED=$((FILES_COPIED + 1))
                            COMMIT_NEEDED=true
                            break
                        fi
                    fi
                done
            fi
        else
            # Intraday periods - use local files only
            for PKL_FILE in "$RESULTS_DATA_DIR"/*.pkl; do
                if [ -f "$PKL_FILE" ]; then
                    file_size=$(stat -c%s "$PKL_FILE" 2>/dev/null || stat -f%z "$PKL_FILE")
                    if [ "$file_size" -gt "$MIN_SIZE" ]; then
                        echo "✅ Found valid $PERIOD pkl: $PKL_FILE ($(($file_size/1024/1024)) MB)"
                        cp "$PKL_FILE" "actions-data-download/$TARGET_FILE"
                        cp "$PKL_FILE" "actions-data-download/$GENERIC_FILE"
                        FILES_COPIED=$((FILES_COPIED + 1))
                        COMMIT_NEEDED=true
                        break
                    else
                        echo "⚠️ File too small (needs >$(($MIN_SIZE/1024/1024)) MB): $PKL_FILE ($(($file_size/1024/1024)) MB)"
                    fi
                fi
            done
        fi
        
        # DO NOT copy .db files - they are too large for GitHub (>100MB limit)
        # Note: instrument_history.db is committed separately in an earlier step (as zip)
        echo "Note: SQLite .db files are not committed here (instrument_history.db committed separately as zip)"
        
        echo "Total valid files copied: $FILES_COPIED"
        
        if [ "$COMMIT_NEEDED" = false ]; then
          echo "⚠️ No valid pkl files found meeting size requirements for period: $PERIOD"
          exit 0
        fi
        
        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "actions@github.com"
        
        # Remove any .db files that may have been accidentally copied (too large for GitHub)
        rm -f actions-data-download/*.db 2>/dev/null || true
        
        # Only add pkl and json files (no .db files - they exceed GitHub's 100MB limit)
        git add -f actions-data-download/*.pkl 2>/dev/null || true
        git add -f actions-data-download/*.json 2>/dev/null || true
        
        # Show what's staged
        echo "Files to be committed:"
        git diff --staged --name-only
        
        if ! git diff --staged --quiet; then
          git commit -m "Update $TARGET_FILE from history download - $TARGET_DATE [period: $PERIOD]"
          
          # Retry push with rebase if needed
          for i in 1 2 3; do
            if git push; then
              echo "✅ Successfully committed updated pkl files to PKScreener actions-data-download"
              break
            else
              echo "Push failed, attempt $i, pulling and retrying..."
              git pull --rebase origin actions-data-download || true
              sleep 2
            fi
          done
        else
          echo "No changes to commit"
        fi

  trigger-next-child-job:
    # Job: Chain to the next time period (day -> minute)
    needs: [historical-data]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    timeout-minutes: 358
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PKDevTools_Default_Log_Level: ${{ github.event.inputs.logLevel || 20 }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Determine next period
      # Step: Decide which period to run next (day -> minute, then stop)
      id: next-period
      run: |
        CURRENT_PERIOD="${{ github.event.inputs.period }}"
        echo "Current period: $CURRENT_PERIOD"
        
        # Only run for two intervals: day and minute (1-min)
        # Other intervals (5minute, 10minute, 30minute, 60minute) are skipped
        case "$CURRENT_PERIOD" in
            "day")
                NEXT_PERIOD="minute"
                ;;
            "minute")
                # Stop after minute - don't cascade to other intervals
                echo "✅ All periods completed (day and minute). Exiting."
                echo "should_exit=true" >> $GITHUB_OUTPUT
                exit 0
                ;;
            *)
                # Default to starting from day if no period specified
                NEXT_PERIOD="day"
                ;;
        esac
        
        echo "Next period: $NEXT_PERIOD"
        echo "next_period=$NEXT_PERIOD" >> $GITHUB_OUTPUT
        echo "should_exit=false" >> $GITHUB_OUTPUT

    - name: Create .env.dev file with secrets
      # Step: Create environment file for the next job
      env:
        CHAT_ID: ${{ secrets.CHAT_ID }}
        TOKEN: ${{ secrets.TOKEN }}
        chat_idADMIN: ${{ secrets.chat_idADMIN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI_PAT: ${{ secrets.CI_PAT }}
        TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        TDU: ${{ secrets.TDU }}
        TAT: ${{ secrets.TAT }}
        MCU: ${{ secrets.MCU }}
        MCAP: ${{ secrets.MCAP }}
        MCL: ${{ secrets.MCL }}
        MS: ${{ secrets.MS }}
        PKG: ${{ secrets.PKG }}
        REPO_URL: ${{ secrets.REPO_URL }}
        KTOKEN: ${{ inputs.kiteToken || secrets.KTOKEN }}
        KUSER: ${{ secrets.KUSER }}
        KPWD: ${{ secrets.KPWD }}
        KTOTP: ${{ secrets.KTOTP }}
        DB_TYPE: local
        TBTOKEN: ${{ secrets.TBTOKEN }}
        Tel_API_ID: ${{ secrets.Tel_API_ID }}
        Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
        Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
        TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
        PERIOD: ${{ inputs.period }}
      run: |
        cat > .env.dev << EOF
        CHAT_ID=$CHAT_ID
        TOKEN=$TOKEN
        chat_idADMIN=$chat_idADMIN
        GITHUB_TOKEN=$GITHUB_TOKEN
        CI_PAT=$CI_PAT
        TURSO_TOKEN=$TURSO_TOKEN
        TDU=$TDU
        TAT=$TAT
        MCU=$MCU
        MCAP=$MCAP
        MCL=$MCL
        MS=$MS
        PKG=$PKG
        REPO_URL=$REPO_URL
        KTOKEN=$KTOKEN
        KUSER=$KUSER
        KPWD=$KPWD
        KTOTP=$KTOTP
        DB_TYPE=local
        TBTOKEN=$TBTOKEN
        PERIOD=$PERIOD
        Tel_API_ID=$Tel_API_ID
        Tel_API_Hash=$Tel_API_Hash
        Tel_Phone_Number=$Tel_Phone_Number
        TEL_SESSION_DATA=$TEL_SESSION_DATA
        PKDevTools_Default_Log_Level=${{ env.PKDevTools_Default_Log_Level }}
        EOF
        
        echo "Created .env.dev file for period: day"

    - name: Exit if all periods completed
      # Step: Exit workflow if all periods are processed
      if: steps.next-period.outputs.should_exit == 'true'
      run: |
        echo "✅ All periods have been processed. Workflow completed."
        exit 0

    - name: Trigger next child job
      # Step: Dispatch the workflow for the next period
      if: steps.next-period.outputs.should_exit == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI_PAT: ${{ secrets.CI_PAT }}
      run: |
        NEXT_PERIOD="${{ steps.next-period.outputs.next_period }}"
        echo "Triggering next child job for period: $NEXT_PERIOD"
        
        LOG_LEVEL="${{ github.event.inputs.logLevel || '20' }}"
        KITE_TOKEN="${{ github.event.inputs.kiteToken || secrets.KTOKEN }}"
        
        # Trigger child workflow for the next period only
        curl -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/workflows/w1-workflow-history-data-child.yml/dispatches" \
          -d "{\"ref\":\"main\",\"inputs\":{\"period\":\"$NEXT_PERIOD\",\"logLevel\":\"$LOG_LEVEL\",\"kiteToken\":\"$KITE_TOKEN\",\"pastoffset\":\"375\"}}"
        
        echo "✅ Successfully triggered next child job for period: $NEXT_PERIOD"

    - name: Send notification about the trigger
      # Step: Send Telegram notification about triggering next job
      shell: bash
      env:
          THIS_KITE_PERIOD : ${{ steps.next-period.outputs.next_period }}
          THIS_KITE_TOKEN: ${{ github.event.inputs.kiteToken || secrets.KTOKEN }}
      run: |
        pip install pkdevtools
        cp .env.dev pkbrokers/kite/examples/.env.dev
        cd pkbrokers/kite/examples/
        python3 -c "import os; from PKDevTools.classes.Telegram import send_message; send_message('✅ Successfully triggered child job with valid Kite token:(' + os.environ['THIS_KITE_TOKEN'] + ') for period: '+os.environ['THIS_KITE_PERIOD']+'\n');"

    - name: Log completion
      # Step: Log that next job was triggered
      run: |
        echo "Next period job triggered successfully. Workflow will continue with the next period in the chain."

    # ==============================================================================
  # WEEKEND SCAN JOB (runs only on Sat/Sun IST, from PKScreener repo)
  # ==============================================================================
  weekend-scan:
    needs: [historical-data]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PKDevTools_Default_Log_Level: ${{ github.event.inputs.logLevel || 20 }}
      TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
    steps:
    - name: Check if today is weekend (Saturday or Sunday in IST)
      id: check_weekend
      run: |
        DAY_OF_WEEK=$(TZ='Asia/Kolkata' date +%u)
        if [ "$DAY_OF_WEEK" -eq 6 ] || [ "$DAY_OF_WEEK" -eq 7 ]; then
          echo "is_weekend=true" >> $GITHUB_OUTPUT
          echo "Today is weekend (day $DAY_OF_WEEK). Proceeding with scan."
        else
          echo "is_weekend=false" >> $GITHUB_OUTPUT
          echo "Today is not weekend (day $DAY_OF_WEEK). Skipping scan."
        fi

    - name: Skip if not weekend
      if: steps.check_weekend.outputs.is_weekend != 'true'
      run: exit 0

    - name: Checkout PKScreener code
      uses: actions/checkout@v4
      with:
        repository: pkjmesra/PKScreener
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies for download script
      run: pip install requests PKDevTools

    - name: Create .env.dev file with secrets
      env:
        CHAT_ID: ${{ secrets.CHAT_ID }}
        TOKEN: ${{ secrets.TOKEN }}
        chat_idADMIN: ${{ secrets.chat_idADMIN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI_PAT: ${{ secrets.CI_PAT }}
        TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        TDU: ${{ secrets.TDU }}
        TAT: ${{ secrets.TAT }}
        MCU: ${{ secrets.MCU }}
        MCAP: ${{ secrets.MCAP }}
        MCL: ${{ secrets.MCL }}
        MS: ${{ secrets.MS }}
        PKG: ${{ secrets.PKG }}
        REPO_URL: ${{ secrets.REPO_URL }}
        KTOKEN: ${{ secrets.KTOKEN }}
        KUSER: ${{ secrets.KUSER }}
        KPWD: ${{ secrets.KPWD }}
        KTOTP: ${{ secrets.KTOTP }}
        DB_TYPE: local
        TBTOKEN: ${{ secrets.TBTOKEN }}
        Tel_API_ID: ${{ secrets.Tel_API_ID }}
        Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
        Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
        TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
        SUBSCRIPTION_ENABLED: 0
      run: |
        cat > .env.dev << EOF
        CHAT_ID='$CHAT_ID'
        TOKEN='$TOKEN'
        chat_idADMIN='$chat_idADMIN'
        GITHUB_TOKEN='$GITHUB_TOKEN'
        CI_PAT='$CI_PAT'
        TURSO_TOKEN='$TURSO_TOKEN'
        TDU='$TDU'
        TAT='$TAT'
        MCU='$MCU'
        MCAP='$MCAP'
        MCL='$MCL'
        MS='$MS'
        PKG='$PKG'
        REPO_URL='$REPO_URL'
        KTOKEN='$KTOKEN'
        KUSER='$KUSER'
        KPWD='$KPWD'
        KTOTP='$KTOTP'
        DB_TYPE='$DB_TYPE'
        TBTOKEN='$TBTOKEN'
        Tel_API_ID='$Tel_API_ID'
        Tel_API_Hash='$Tel_API_Hash'
        Tel_Phone_Number='$Tel_Phone_Number'
        TEL_SESSION_DATA='$TEL_SESSION_DATA'
        SUBSCRIPTION_ENABLED='$SUBSCRIPTION_ENABLED'
        EOF
        echo "Created .env.dev"

    - name: Create Telegram session file
      run: |
        echo "${{ secrets.TEL_SESSION_DATA }}" | base64 -d > user_session.session
        chmod 600 user_session.session

    - name: Get Linux binary download URL
      id: get_binary_url
      run: |
        # Use githubutilities.py which should output DOWNLOAD_URL for the current OS
        python3 .github/workflows/githubutilities.py -d
        
        # The script may set an environment variable or output; we also directly query the API for safety
        LINUX_URL=$(curl -s https://api.github.com/repos/pkjmesra/PKScreener/releases/latest | jq -r '.assets[] | select(.name == "pkscreenercli_x64.bin") | .browser_download_url')
        if [ -n "$LINUX_URL" ]; then
          echo "download_url=$LINUX_URL" >> $GITHUB_OUTPUT
        else
          # Fallback: try to get any asset that contains 'x64.bin' and is not .gz
          FALLBACK_URL=$(curl -s https://api.github.com/repos/pkjmesra/PKScreener/releases/latest | jq -r '.assets[] | select(.name | contains("x64.bin") and (contains(".gz") | not)) | .browser_download_url' | head -1)
          echo "download_url=$FALLBACK_URL" >> $GITHUB_OUTPUT
        fi

    - name: Download and validate Linux executable
      run: |
        BINARY_NAME="pkscreenercli_x64.bin"
        DOWNLOAD_URL="${{ steps.get_binary_url.outputs.download_url }}"
        
        if [ -z "$DOWNLOAD_URL" ]; then
          echo "ERROR: Could not find Linux binary download URL"
          exit 1
        fi
        
        echo "Downloading from $DOWNLOAD_URL"
        curl -L -o "$BINARY_NAME" "$DOWNLOAD_URL"
        
        # Validate binary format
        if ! file "$BINARY_NAME" | grep -q "ELF 64-bit"; then
          echo "ERROR: Downloaded file is not a valid Linux ELF binary:"
          file "$BINARY_NAME"
          exit 1
        fi
        
        chmod +x "$BINARY_NAME"
        echo "✅ Valid Linux binary ready: $BINARY_NAME"

    - name: Run weekend scan
      run: |
        echo "Running scan: ./pkscreenercli_x64.bin -a Y -e -o X:12:0 -l"
        ./pkscreenercli_x64.bin -a Y -e -o X:12:0 -l
      env:
        CI_PAT: ${{ secrets.CI_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RUNNER: 1
        PK_DEBUG_ALL: 1

    - name: Commit resulting PKL files after scan
      env:
        CI_PAT: ${{ secrets.CI_PAT }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Determine target date using Archiver
        TARGET_INFO=$(python3 -c "
        from PKDevTools.classes import Archiver
        cache_exists, cache_file_name = Archiver.afterMarketStockDataExists()
        if cache_file_name:
            print(f'{cache_file_name}')
        else:
            print('stock_data_$(date +%d%m%Y).pkl')
        ")
        
        if [[ $TARGET_INFO =~ stock_data_([0-9]{8})\.pkl ]]; then
            TARGET_DATE="${BASH_REMATCH[1]}"
        else
            TARGET_DATE=$(date +%d%m%Y)
        fi
        
        RESULTS_DATA_DIR="$(pwd)/results/Data"
        echo "Results directory: $RESULTS_DATA_DIR"
        
        # Clone the actions-data-download branch
        git clone --single-branch --branch actions-data-download https://x-access-token:$CI_PAT@github.com/pkjmesra/PKScreener.git pkscreener-data
        cd pkscreener-data
        
        PERIOD="day"
        TARGET_FILE="stock_data_${TARGET_DATE}.pkl"
        GENERIC_FILE="daily_candles.pkl"
        MIN_SIZE=25000000  # 25 MB
        
        mkdir -p actions-data-download
        
        # Copy both dated and generic pkl files if they exist and are valid
        if [ -f "$RESULTS_DATA_DIR/$TARGET_FILE" ]; then
            FILE_SIZE=$(stat -c%s "$RESULTS_DATA_DIR/$TARGET_FILE" 2>/dev/null || stat -f%z "$RESULTS_DATA_DIR/$TARGET_FILE")
            if [ "$FILE_SIZE" -gt "$MIN_SIZE" ]; then
                cp "$RESULTS_DATA_DIR/$TARGET_FILE" "actions-data-download/$TARGET_FILE"
                cp "$RESULTS_DATA_DIR/$TARGET_FILE" "actions-data-download/$GENERIC_FILE"
                
                git config user.name "github-actions[bot]"
                git config user.email "actions@github.com"
                git add -f actions-data-download/*.pkl
                
                if ! git diff --staged --quiet; then
                  git commit -m "Weekend scan update: $TARGET_FILE - $TARGET_DATE [skip ci]"
                  git push
                  echo "✅ Committed weekend scan PKL files"
                else
                  echo "No changes to PKL files after scan"
                fi
            else
                echo "⚠️ PKL file too small ($FILE_SIZE bytes), skipping commit"
            fi
        else
            echo "⚠️ No PKL file found at $RESULTS_DATA_DIR/$TARGET_FILE"
        fi