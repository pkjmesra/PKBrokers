name: 0. 24x7 bot Ticks Runner
on:
  schedule:
    # Every 4 hours and 30 minutes as a backup/fallback
    - cron: '30 */4 * * *'
  workflow_dispatch:  # Allow manual triggering
    inputs:
      logLevel:
        description: 'Log level for PKDevTools (default 20)'
        required: false
        default: 20
        type: number
      triggered_by:
        description: 'What triggered this run'
        required: false
        default: 'manual'
        type: string

# Add permissions for repository dispatch
permissions:
  contents: write
  actions: write

jobs:
  market-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # Set a timeout to prevent hanging runs
    env:
      PKDevTools_Default_Log_Level: ${{ github.event.inputs.logLevel || '20' }}
      TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
      TRIGGERED_BY: ${{ github.event.inputs.triggered_by || 'schedule' }}
    
    steps:
    - name: Log trigger source
      run: |
        echo "🎯 Workflow triggered by: ${{ env.TRIGGERED_BY }}"
        echo "🎯 Run ID: ${{ github.run_id }}"
        echo "🎯 Run number: ${{ github.run_number }}"

    - name: Checkout PKBrokers code
      uses: actions/checkout@v4
      with:
        repository: pkjmesra/PKBrokers
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Restore pip cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-pkbrokers-${{ hashFiles('**/setup.py', '**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-pkbrokers-
          ${{ runner.os }}-pip-

    - name: Install PKBrokers dependencies
      run: |
        pip install -e .
        pip install kiteconnect libsql==0.1.6

    - name: Create .env.dev file with secrets
      env:
        # Map all PKBrokers related secrets to environment variables
        CHAT_ID: ${{ secrets.CHAT_ID }}
        TOKEN: ${{ secrets.TOKEN }}
        chat_idADMIN: ${{ secrets.chat_idADMIN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI_PAT: ${{ secrets.CI_PAT }}
        TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        TDU: ${{ secrets.TDU }}
        TAT: ${{ secrets.TAT }}
        MCU: ${{ secrets.MCU }}
        MCAP: ${{ secrets.MCAP }}
        MCL: ${{ secrets.MCL }}
        MS: ${{ secrets.MS }}
        PKG: ${{ secrets.PKG }}
        REPO_URL: ${{ secrets.REPO_URL }}
        KTOKEN: ${{ secrets.KTOKEN }}
        KUSER: ${{ secrets.KUSER }}
        KPWD: ${{ secrets.KPWD }}
        KTOTP: ${{ secrets.KTOTP }}
        DB_TYPE: "local"
        DB_TICKS: ${{ secrets.DB_TICKS }}
        TBTOKEN: ${{ secrets.TBTOKEN }}
        BBTOKEN: ${{ secrets.BBTOKEN }}
        Tel_API_ID: ${{ secrets.Tel_API_ID }}
        Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
        Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
        TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
      run: |
        cat > .env.dev << EOF
        CHAT_ID=$CHAT_ID
        TOKEN=$TOKEN
        chat_idADMIN=$chat_idADMIN
        GITHUB_TOKEN=$GITHUB_TOKEN
        CI_PAT=$CI_PAT
        TURSO_TOKEN=$TURSO_TOKEN
        TDU=$TDU
        TAT=$TAT
        MCU=$MCU
        MCAP=$MCAP
        MCL=$MCL
        MS=$MS
        PKG=$PKG
        REPO_URL=$REPO_URL
        KTOKEN=$KTOKEN
        KUSER=$KUSER
        KPWD=$KPWD
        KTOTP=$KTOTP
        DB_TYPE=$DB_TYPE
        DB_TICKS=$DB_TICKS
        TBTOKEN=$TBTOKEN
        BBTOKEN=$BBTOKEN
        Tel_API_ID=$Tel_API_ID
        Tel_API_Hash=$Tel_API_Hash
        Tel_Phone_Number=$Tel_Phone_Number
        TEL_SESSION_DATA=$TEL_SESSION_DATA
        PKDevTools_Default_Log_Level=${{ env.PKDevTools_Default_Log_Level }}
        EOF
        
        echo "Created .env.dev file with secrets"
        echo "Set PKDevTools_Default_Log_Level to ${{ env.PKDevTools_Default_Log_Level }}"

    - name: Create session file
      run: |
        echo ${{ env.TEL_SESSION_DATA }} | base64 -d > user_session.session
        chmod 600 user_session.session
        cp .env.dev pkbrokers/kite/examples/.env.dev
        cd pkbrokers/kite/examples/
        echo ${{ env.TEL_SESSION_DATA }} | base64 -d > user_session.session
        chmod 600 user_session.session

    - name: Run pkkite orchestrator from source
      timeout-minutes: 290  # Slightly less than job timeout to allow cleanup
      env:
        PYTHONUNBUFFERED: 1  # Force unbuffered output
        PKDevTools_Default_Log_Level: ${{ env.PKDevTools_Default_Log_Level }}
      run: |
        # Run pkkite directly from the source module
        echo "Running pkkite --orchestrate from PKBrokers source..."
        pwd
        cp .env.dev pkbrokers/kite/examples/.env.dev
        cd pkbrokers/kite/examples/
        python pkkite.py --orchestrate --verbose 2>&1 | while IFS= read -r line; do
          # Print timestamp with each log line for better debugging
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] $line"
        done
        
        EXIT_CODE=${PIPESTATUS[0]}
        echo "pkkite exited with code $EXIT_CODE"

    - name: Generate pkl files from ticks
      if: always()
      run: |
        echo "Generating pkl files using the reliable pkl generator script..."
        
        cd pkbrokers/kite/examples
        
        # Run the pkl generator script which:
        # 1. Loads local ticks.json or downloads from GitHub
        # 2. Downloads historical pkl from GitHub
        # 3. Merges ticks with historical data
        # 4. Saves both intraday and daily pkl files
        
        python3 ../../../pkbrokers/scripts/generate_pkl_from_ticks.py --data-dir results/Data --verbose
        
        # List generated files
        echo "Generated files:"
        ls -la results/Data/*.pkl 2>/dev/null || echo "No pkl files generated"
        
        cd ../../..

    - name: Get Archive Date String
      if: always()
      id: get_date
      run: |
        python .github/workflows/get_archive_date.py

    - name: Push validated files to PKScreener with size checks
      if: always()
      env:
        GH_TOKEN: ${{ secrets.CI_PAT }}
        ARCHIVE_DATE_STR: ${{ steps.get_date.outputs.date_str }}
      run: |
        echo "Checking for files to push to PKScreener with size validation..."
        
        # Define size thresholds (in bytes)
        TICKS_MIN_SIZE=800000        # 1 MB minimum for ticks.json
        DAILY_PKL_MIN_SIZE=25000000    # 25 MB minimum for daily pkl
        INTRADAY_PKL_MIN_SIZE=800000  # 1 MB minimum for intraday pkl
        
        # Define paths - check multiple locations
        TICKS_PATH_1="pkbrokers/kite/examples/results/Data/ticks.json"
        TICKS_PATH_2="pkbrokers/kite/examples/ticks.json"
        DATA_DIR_1="pkbrokers/kite/examples/results/Data"
        DATA_DIR_2="pkbrokers/kite/examples"
        
        # Find ticks.json
        TICKS_FOUND=false
        TICKS_VALID=false
        TICKS_SIZE=0
        
        if [ -f "$TICKS_PATH_1" ] && [ -s "$TICKS_PATH_1" ]; then
          TICKS_PATH="$TICKS_PATH_1"
          TICKS_FOUND=true
        elif [ -f "$TICKS_PATH_2" ] && [ -s "$TICKS_PATH_2" ]; then
          TICKS_PATH="$TICKS_PATH_2"
          TICKS_FOUND=true
        fi
        
        # Find DATA_DIR with pkl files
        if [ -d "$DATA_DIR_1" ]; then
          DATA_DIR="$DATA_DIR_1"
        else
          DATA_DIR="$DATA_DIR_2"
        fi
        
        echo "Using TICKS_PATH: $TICKS_PATH"
        echo "Using DATA_DIR: $DATA_DIR"
        
        # Clone PKScreener
        echo "Cloning PKScreener actions-data-download branch..."
        git clone --depth 1 --branch actions-data-download https://x-access-token:${GH_TOKEN}@github.com/pkjmesra/PKScreener.git pkscreener-data || {
          echo "Branch doesn't exist, cloning main and creating branch..."
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/pkjmesra/PKScreener.git pkscreener-data
          cd pkscreener-data && git checkout -b actions-data-download && cd ..
        }
        
        mkdir -p pkscreener-data/results/Data
        mkdir -p pkscreener-data/actions-data-download
        
        FILES_COPIED=0
        TICKS_COMMITTED=false
        
        # Function to validate and copy file with size check
        validate_and_copy() {
            local src_file=$1
            local dst_path=$2
            local min_size=$3
            local file_type=$4
            
            if [ -f "$src_file" ]; then
                local file_size=$(stat -c%s "$src_file" 2>/dev/null || stat -f%z "$src_file")
                echo "Found $file_type: $src_file ($(($file_size/1024/1024)) MB)"
                
                if [ "$file_size" -gt "$min_size" ]; then
                    echo "  ✅ Size validation passed ($(($file_size/1024/1024)) MB >= $(($min_size/1024/1024)) MB)"
                    cp "$src_file" "$dst_path"
                    FILES_COPIED=$((FILES_COPIED + 1))
                    return 0
                else
                    echo "  ⚠️ Size validation FAILED ($(($file_size/1024/1024)) MB < $(($min_size/1024/1024)) MB) - skipping"
                    return 1
                fi
            else
                echo "  ℹ️ File not found: $src_file"
                return 1
            fi
        }
        
        # Copy and validate ticks.json
        if [ "$TICKS_FOUND" = true ]; then
            TICKS_SIZE=$(stat -c%s "$TICKS_PATH" 2>/dev/null || stat -f%z "$TICKS_PATH")
            echo "Found ticks.json ($(($TICKS_SIZE/1024/1024)) MB)"
            
            if [ "$TICKS_SIZE" -gt "$TICKS_MIN_SIZE" ]; then
                echo "  ✅ ticks.json size validation passed ($(($TICKS_SIZE/1024/1024)) MB >= 1 MB)"
                cp "$TICKS_PATH" pkscreener-data/results/Data/ticks.json
                FILES_COPIED=$((FILES_COPIED + 1))
                TICKS_COMMITTED=true
            else
                echo "  ⚠️ ticks.json size validation FAILED ($(($TICKS_SIZE/1024/1024)) MB < 1 MB) - skipping"
            fi
        fi
        
        # Define specific file names with date suffix
        DAILY_CANDLES_FILE="$DATA_DIR/daily_candles.pkl"
        STOCK_DATA_FILE="$DATA_DIR/stock_data_$ARCHIVE_DATE_STR.pkl"
        INTRADAY_CANDLES_FILE="$DATA_DIR/intraday_1m_candles.pkl"
        INTRADAY_STOCK_DATA_FILE="$DATA_DIR/intraday_stock_data_$ARCHIVE_DATE_STR.pkl"
        
        # Copy and validate daily pkl files
        echo ""
        echo "Validating daily pkl files (minimum 25 MB):"
        validate_and_copy "$DAILY_CANDLES_FILE" "pkscreener-data/actions-data-download/daily_candles.pkl" $DAILY_PKL_MIN_SIZE "daily_candles.pkl"
        validate_and_copy "$STOCK_DATA_FILE" "pkscreener-data/actions-data-download/stock_data_$ARCHIVE_DATE_STR.pkl" $DAILY_PKL_MIN_SIZE "stock_data_$ARCHIVE_DATE_STR.pkl"
        
        # Copy and validate intraday pkl files
        echo ""
        echo "Validating intraday pkl files (minimum 1 MB):"
        validate_and_copy "$INTRADAY_CANDLES_FILE" "pkscreener-data/actions-data-download/intraday_1m_candles.pkl" $INTRADAY_PKL_MIN_SIZE "intraday_1m_candles.pkl"
        validate_and_copy "$INTRADAY_STOCK_DATA_FILE" "pkscreener-data/actions-data-download/intraday_stock_data_$ARCHIVE_DATE_STR.pkl" $INTRADAY_PKL_MIN_SIZE "intraday_stock_data_$ARCHIVE_DATE_STR.pkl"
        
        # Check for any candles.db files (optional, no size validation)
        CANDLES_DB_FILE="$DATA_DIR/candles_$ARCHIVE_DATE_STR.db"
        if [ -f "$CANDLES_DB_FILE" ]; then
            DB_SIZE=$(stat -c%s "$CANDLES_DB_FILE" 2>/dev/null || stat -f%z "$CANDLES_DB_FILE")
            echo ""
            echo "Found candles_$ARCHIVE_DATE_STR.db ($(($DB_SIZE/1024/1024)) MB) - copying without size validation"
            cp "$CANDLES_DB_FILE" pkscreener-data/actions-data-download/
            FILES_COPIED=$((FILES_COPIED + 1))
        fi
        
        # Create metadata only if ticks.json was committed
        if [ "$TICKS_COMMITTED" = true ]; then
          echo ""
          echo "Creating metadata file (ticks.json was committed)..."
          cat > pkscreener-data/results/Data/ticks_metadata.json << EOF
        {
          "source": "PKBrokers-orchestrator",
          "synced_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "workflow": "w0-workflow-ticks-update.yml",
          "files_copied": $FILES_COPIED,
          "date_suffix": "$ARCHIVE_DATE_STR",
          "ticks_size_mb": $(($TICKS_SIZE/1024/1024)),
          "files_validated": true,
          "triggered_by": "${{ env.TRIGGERED_BY }}"
        }
        EOF
          # Copy metadata to actions-data-download as well
          cp pkscreener-data/results/Data/ticks_metadata.json pkscreener-data/actions-data-download/
          FILES_COPIED=$((FILES_COPIED + 1))
          echo "✅ Created metadata file with validation info"
        else
          echo ""
          echo "⚠️ ticks.json not committed (size too small or missing) - skipping metadata creation"
        fi
        
        if [ "$FILES_COPIED" -gt 0 ]; then
          echo ""
          echo "Total valid files to commit: $FILES_COPIED"
          
          cd pkscreener-data
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          # Use -f to force add files that may be in .gitignore
          echo "Staging files for commit..."
          git add -f results/Data/ actions-data-download/ 2>/dev/null || true
          
          # Show what's being committed
          echo "Files staged:"
          git diff --staged --name-only
          
          if git diff --staged --quiet; then
            echo "No changes to push"
          else
            # Get summary of files being committed with sizes
            echo ""
            echo "📊 Files being committed with size validation:"
            for file in $(git diff --staged --name-only); do
              if [ -f "$file" ]; then
                size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
                echo "  • $file ($(($size/1024/1024)) MB)"
              fi
            done
            
            git commit -m "Sync validated files from PKBrokers $(date -u +%Y-%m-%dT%H:%M:%SZ) [ticks:$(($TICKS_SIZE/1024/1024))MB]"
            
            # Retry logic for push conflicts
            for i in 1 2 3; do
              if git push origin actions-data-download; then
                echo "✅ Files pushed to PKScreener successfully ($FILES_COPIED validated files)"
                break
              else
                echo "Push failed, attempt $i, pulling and retrying..."
                git pull --rebase origin actions-data-download || true
                sleep 2
              fi
            done
          fi
          cd ..
        else
          echo "❌ No valid files found meeting size requirements - nothing to push"
        fi

    - name: Cleanup .env.dev file
      if: always()
      run: |
        echo "Cleaning up .env.dev file"
        rm -f .env.dev

    - name: Self-trigger for 24x7 continuity
      if: always() && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🔄 Self-triggering workflow for 24x7 continuity..."
        
        # Get current timestamp
        CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        echo "Current time: $CURRENT_TIME"
        
        # Calculate when the next run should start (5 minutes before this job would have ended)
        # This ensures seamless coverage
        NEXT_RUN_DELAY=5  # minutes
        
        # Trigger the workflow using repository dispatch
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/w0-workflow-ticks-update.yml/dispatches \
          -d "{\"ref\":\"main\",\"inputs\":{\"logLevel\":\"${{ env.PKDevTools_Default_Log_Level }}\",\"triggered_by\":\"self_trigger_after_${{ github.run_id }}\"}}"
        
        echo "✅ Self-trigger initiated successfully"
        echo "⏱️  Next run should start within 1-2 minutes"

    - name: Delete history of workflow runs
      shell: bash
      if: always()
      run: |
        gh run list --status completed --limit 100 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
        gh run list --status cancelled --limit 100 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
      env:
        GH_TOKEN : ${{secrets.GITHUB_TOKEN}}